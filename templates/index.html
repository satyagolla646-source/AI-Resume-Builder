<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Builder</title>
    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
}

.container{
    width:70%;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#2563eb;
    margin-bottom:25px;
}

input, textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

textarea{
    height:100px;
    resize:none;
}

button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}
</style>
</head>
<body>

<h2>AI Resume Builder</h2>

<form action="/generate" method="POST">

<input type="text" name="name" placeholder="Name" required><br><br>

<input type="email" name="email" placeholder="Email" required><br><br>

<input type="text" name="phone" placeholder="Phone" required><br><br>

<textarea name="skills" placeholder="Skills"></textarea><br><br>

<textarea name="education" placeholder="Education"></textarea><br><br>

<textarea name="experience" placeholder="Experience"></textarea><br><br>

<button type="submit">Generate Resume</button>

</form>

</body>
</html>
